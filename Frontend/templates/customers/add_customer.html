{% extends 'base.html' %}

{% block content %}

    {% if add_form %}
        <h1 class="text-center text-dark my-5">Add Customer</h1>

        <form method="POST">
            {% csrf_token %}
            {{ add_form }}

            <button class="btn btn-primary my-4 fs-4" type="submit">Add Customer</button>
        </form>
    {% else %}
        <h1 class="text-center text-dark my-5">Edit Customer</h1>

        <form method="POST">
            {% csrf_token %}
            {{ edit_form }}

            <button class="btn btn-primary my-4 fs-4" type="submit">Edit Customer</button>
        </form>
    {% endif %}


{% endblock %}
